<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#0f0f16"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="url(#g)" stroke-width="1.8" filter="url(#glow)"/>
  <!-- Orbital ring 1 -->
  <ellipse cx="16" cy="16" rx="10.5" ry="4" fill="none" stroke="url(#g)" stroke-width="1.2" transform="rotate(-38 16 16)" filter="url(#glow)"/>
  <!-- Orbital ring 2 -->
  <ellipse cx="16" cy="16" rx="10.5" ry="4" fill="none" stroke="url(#g)" stroke-width="1.2" transform="rotate(38 16 16)" filter="url(#glow)"/>
  <!-- Center node -->
  <circle cx="16" cy="16" r="2" fill="#a78bfa"/>
</svg>
