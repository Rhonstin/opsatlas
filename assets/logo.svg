<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" width="220" height="56">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Globe icon centered at (28, 28), r=20 -->
  <!-- Outer ring -->
  <circle cx="28" cy="28" r="20" fill="none" stroke="url(#g)" stroke-width="2.2" filter="url(#glow)"/>
  <!-- Orbital ring 1 -->
  <ellipse cx="28" cy="28" rx="20" ry="7.5" fill="none" stroke="url(#g)" stroke-width="1.5" transform="rotate(-38 28 28)" filter="url(#glow)"/>
  <!-- Orbital ring 2 -->
  <ellipse cx="28" cy="28" rx="20" ry="7.5" fill="none" stroke="url(#g)" stroke-width="1.5" transform="rotate(38 28 28)" filter="url(#glow)"/>
  <!-- Center node -->
  <circle cx="28" cy="28" r="3" fill="#a78bfa"/>
  <!-- Wordmark -->
  <text x="60" y="36" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="url(#g)" letter-spacing="-0.5">opsatlas</text>
</svg>
