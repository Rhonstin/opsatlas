services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opsatlas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ghcr.io/rhonstin/opsatlas/backend:main
    ports:
      - '${BACKEND_PORT:-4000}:4000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/opsatlas
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/rhonstin/opsatlas/frontend:main
    ports:
      - '${FRONTEND_PORT:-3000}:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
